<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gitleaks � Custom Viewer</title>
    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            padding: 24px;
        }

        .controls {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f4f4f4;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: monospace;
        }

        .hidden {
            display: none;
        }

        .errors {
            color: #a00;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Gitleaks JSON � Table view (RuleId, Description, Secret, Line, Date, Message, Link)</h1>

        <section class="controls">
            <label>
                Choose JSON files
                <input id="fileInput" type="file" accept=".json,application/json" multiple />
            </label>
            <button id="clearBtn" type="button">Clear</button>
            <div id="summary">No files loaded</div>
        </section>

        <section id="tableSection" class="hidden" aria-live="polite">
            <table id="resultsTable" aria-label="Gitleaks results">
                <thead>
                    <tr>
                        <th>RuleId</th>
                        <th>Description</th>
                        <th>Secret</th>
                        <th>Line</th>
                        <th>Date</th>
                        <th>Message</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <section id="errors" class="errors" aria-live="polite"></section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
